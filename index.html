<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Catalogo Novacort</title>

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background:
      linear-gradient(
        135deg,
        #1f1f1f,
        #121212
      );

      color: white;

    }

    .header {

      padding: 40px;

    }

    .header h1 {

      margin: 0;

      font-size: 42px;

      letter-spacing: 1px;

    }

    .header p {

      margin-top: 10px;

      color: rgba(255,255,255,0.7);

    }

    .catalogo {

      display: grid;

      grid-template-columns:
      repeat(auto-fit, minmax(320px, 1fr));

      gap: 30px;

      padding: 40px;

    }

    .card {

      background:
      rgba(255,255,255,0.04);

      border-radius: 24px;

      overflow: hidden;

      backdrop-filter: blur(10px);

      transition:
      transform 0.3s ease,
      box-shadow 0.3s ease;

      cursor: pointer;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.25);

    }

    .card:hover {

      transform: translateY(-8px);

      box-shadow:
      0 18px 40px rgba(0,0,0,0.4);

    }

    .card img {

      width: 100%;

      height: 320px;

      object-fit: contain;

      display: block;

    }

    .card-content {

      padding: 24px;

    }

    .card-content h2 {

      margin-top: 0;

      margin-bottom: 10px;

    }

    .card-content p {

      color:
      rgba(255,255,255,0.72);

      line-height: 1.6;

    }

    .tag {

      display: inline-block;

      margin-top: 16px;

      padding:
      8px 14px;

      border-radius: 999px;

      background:
      rgba(255,255,255,0.08);

      font-size: 13px;

    }

  </style>

</head>

<body>

  <div class="header">

    <h1>Novacort</h1>

    <p>
      Catalogo interactivo de productos
    </p>

  </div>


  <div class="catalogo">

    <!-- PRODUCTO 1 -->

    <div
      class="card"
      onclick="openProduct('cuadrado')">

      <img
        src="img/cuadrado.webp"
        alt="Cortinero Cuadrado">

      <div class="card-content">

        <h2>Cortinero Cuadrado</h2>

        <p>
          Sistema de riel premium con
          deslizamiento suave y acabado
          resistente a la corrosión.
        </p>

        <div class="tag">

          Cortineros

        </div>

      </div>

    </div>

    <div class="card" onclick="openProduct('REFORZADO')">

      <img src="img/reforzado.webp" alt="Cortinero Reforzado">

      <div class="card-content">

        <h2>Cortinero Reforzado</h2>

        <p>
          Sistema de riel premium con
          deslizamiento suave y acabado
          resistente a la corrosión.
        </p>

        <div class="tag">

          Cortineros

        </div>

      </div>


    </div>

  </div>


  <script>

    function openProduct(product) {

      window.location.href =
        `viewer.html?product=${product}`;

    }

  </script>

</body>

</html>
